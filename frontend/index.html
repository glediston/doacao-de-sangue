

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Doação de Sangue</title>
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/index.css">
</head>
<body>

<header>
  <h1>❤️ Doação de Sangue</h1>
  <nav>
    <button onclick="openModal('login')">Login</button>
    <button onclick="openModal('register')">Cadastrar</button>
  </nav>
</header>

<main>
  <section class="hero">
    <h2>Doe sangue. Salve vidas.</h2>
    <p>
      Uma única doação pode salvar até 4 vidas.
      Seja um herói hoje.
    </p>
  </section>
</main>

<!-- MODAL LOGIN -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h3>Login</h3>

    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Senha">

    <p class="error" id="loginError"></p>

    <button onclick="login()">Entrar</button>
    <button onclick="closeModal()">Cancelar</button>
  </div>
</div>

<!-- MODAL REGISTER -->
<div class="modal" id="registerModal">
  <div class="modal-content">
    <h3>Cadastrar</h3>

    <input id="regName" placeholder="Nome">
    <input id="regEmail" placeholder="Email">
    <input id="regPassword" type="password" placeholder="Senha">

    <select id="regGender">
      <option value="">Sexo</option>
      <option value="MALE">Masculino</option>
      <option value="FEMALE">Feminino</option>
    </select>

    <select id="regBlood">
      <option value="">Tipo sanguíneo</option>
      <option value="A_POS">A+</option>
      <option value="A_NEG">A-</option>
      <option value="B_POS">B+</option>
      <option value="B_NEG">B-</option>
      <option value="AB_POS">AB+</option>
      <option value="AB_NEG">AB-</option>
      <option value="O_POS">O+</option>
      <option value="O_NEG">O-</option>
    </select>

    <p class="error" id="registerError"></p>

    <button onclick="register()">Cadastrar</button>
    <button onclick="closeModal()">Cancelar</button>
  </div>
</div>

<!-- AXIOS -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="./js/api.js"></script>
<script src="./js/modal.js"></script>
<script src="./js/auth.js"></script>

</body>
</html>
